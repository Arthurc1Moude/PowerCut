name: Generate Xcode Project

on:
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - 'project.yml'
      - '.github/workflows/generate-xcode-project.yml'

jobs:
  generate:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: |
          brew install xcodegen
      
      - name: Generate Xcode project
        run: |
          xcodegen generate
      
      - name: Verify project was created
        run: |
          if [ -f "PowerCut.xcodeproj/project.pbxproj" ]; then
            echo "✅ Xcode project generated successfully"
            ls -la PowerCut.xcodeproj/
          else
            echo "❌ Failed to generate Xcode project"
            exit 1
          fi
      
      - name: Upload Xcode project
        uses: actions/upload-artifact@v4
        with:
          name: xcode-project
          path: PowerCut.xcodeproj/
          retention-days: 30
      
      - name: Create Pull Request with generated project
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Generate Xcode project with xcodegen"
          title: "Add generated Xcode project"
          body: |
            This PR adds the Xcode project file generated by xcodegen.
            
            The project was generated from `project.yml` on macOS using GitHub Actions.
            
            Once merged, the project will be ready for building.
          branch: xcodegen-project
          delete-branch: true
